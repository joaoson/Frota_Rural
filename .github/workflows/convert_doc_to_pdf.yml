name: Convert Docx to PDF
on:
  push:
    branches: [ main ]

jobs:
  convert_to_pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Pandoc and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc python3-pip
          sudo apt-get install -y wkhtmltopdf 

      - name: Run Conversion
        run: |
            pandoc "BSI-Especificação do Projeto-Frota Rural.docx" -o "BSI-Especificação do Projeto-Frota Rural.pdf"
      - 
        name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: converted-pdf
          path: result.pdf